<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>おじさんインベーダー</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }
        
        #gameContainer {
            position: relative;
            border: 2px solid #0f0;
            box-shadow: 0 0 20px #0f0;
        }
        
        #gameCanvas {
            display: block;
            background: #000;
        }
        
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #0f0;
            font-size: 16px;
            text-shadow: 2px 2px 4px rgba(0, 255, 0, 0.5);
        }
        
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #f00;
            font-size: 48px;
            text-align: center;
            display: none;
            text-shadow: 2px 2px 4px rgba(255, 0, 0, 0.5);
        }
        
        #startScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f0;
            font-size: 24px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0, 255, 0, 0.5);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui">
            <div>スコア: <span id="score">0</span></div>
            <div>ライフ: <span id="lives">3</span></div>
        </div>
        <div id="gameOver">
            <div>ゲームオーバー</div>
            <div style="font-size: 16px; margin-top: 20px;">スペースキーでリスタート</div>
        </div>
        <div id="startScreen">
            <div>おじさんインベーダー</div>
            <div style="font-size: 16px; margin-top: 20px;">
                矢印キー: 移動<br>
                スペースキー: ネクタイビーム発射<br>
                ¥500,000札を避けてキャバ嬢を倒そう！
            </div>
            <div style="font-size: 14px; margin-top: 20px; color: #fff;">
                スペースキーで開始
            </div>
        </div>
    </div>
    
    <script src="js/game-engine.js"></script>
    <script src="js/game-objects.js"></script>
    <script src="js/input-system.js"></script>
    <script src="js/ui-system.js"></script>
    <script src="js/sound-system.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
